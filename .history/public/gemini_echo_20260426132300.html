        const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        chevron.setAttribute('viewBox', '0 0 24 24');
        chevron.classList.add('group-chevron');
        const cp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        cp.setAttribute('d', 'M7 10l5 5 5-5z');
        chevron.appendChild(cp);

        const nameSpan = document.createElement('span');
        nameSpan.className = 'group-name-text';
        nameSpan.textContent = group.name;

        const actions = document.createElement('div');
        actions.className = 'group-actions';

        const renameBtn = document.createElement('button');
        renameBtn.className = 'group-action-btn';
        renameBtn.title = '重命名';
        renameBtn.innerHTML = `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
        renameBtn.addEventListener('click', (e) => renameGroup(e, group));

        const delBtn = document.createElement('button');
        delBtn.className = 'group-action-btn del';
        delBtn.title = '删除分组';
        delBtn.innerHTML = `<svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;
        delBtn.addEventListener('click', (e) => deleteGroup(e, group.id));

        actions.appendChild(renameBtn);
        actions.appendChild(delBtn);
        hdr.appendChild(chevron);
        hdr.appendChild(nameSpan);
        hdr.appendChild(actions);

        hdr.addEventListener('click', (e) => {
            if (e.target.closest('.group-action-btn')) return;
            toggleCollapse(group);
        });

        return hdr;
    }

    /* ── 批量同步 sortOrder + groupId 到云端 ─────────────────────── */
    function _syncOrderAndGroups(sessions) {
        if (!window.DB) return;
        window.setSyncStatus?.('loading', '同步中…');
        Promise.all(
            sessions.map(s => window.DB.patchSession(s.id, {
                sortOrder: s.sortOrder,
                groupId:   s.groupId ?? null,
            }))
        )
        .then(() => window.setSyncStatus?.('ok', '已同步'))
        .catch(err => {
            console.error('[Firebase] 排序/分组同步失败:', err);
            window.setSyncStatus?.('error', '同步失败');
        });
    }

    /* ── 主渲染函数 ──────────────────────────────────────────────── */
    function render() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';

        const groups   = [...App.state.groups].sort((a, b) => a.sortOrder - b.sortOrder);
        const sessions = App.state.sessions;

        // 按分组分桶
        const buckets = {};
        groups.forEach(g => { buckets[g.id] = []; });
        const ungrouped = [];
        sessions.forEach(s => {
            if (s.groupId && buckets[s.groupId]) buckets[s.groupId].push(s);
            else ungrouped.push(s);
        });

        // 渲染各分组
        groups.forEach(group => {
            const hdr   = _buildGroupHeader(group);
            const items = document.createElement('div');
            items.className = 'group-items';

            const groupSessions = buckets[group.id];
            const totalHeight   = groupSessions.length * 64; // 预估高度，用于动画
            items.style.maxHeight = group.collapsed ? '0' : `${totalHeight + 200}px`;

            groupSessions.forEach(sess => items.appendChild(_buildSessionItem(sess)));

            list.appendChild(hdr);
            list.appendChild(items);
        });

        // 渲染未分组
        if (ungrouped.length > 0) {
            if (groups.length > 0) {
                const label = document.createElement('div');
                label.className = 'ungrouped-label';
                label.textContent = '未分组';
                list.appendChild(label);
            }
            ungrouped.forEach(sess => list.appendChild(_buildSessionItem(sess)));
        }
    }

    // 绑定「新建分组」按钮
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('addGroupBtn')?.addEventListener('click', createGroup);
    });

    return { toggle, render, createGroup };
})();


/* ================================================================
   § 11. RENDERER
   Builds and mounts the chat view for a given session.

   Bug fixed: currentScroller.destroy() is now called explicitly
   before clearing chatContainer.innerHTML, preventing the previous
   scroll event listener from leaking into memory on every session
   switch.

   Bug fixed: thought-header now uses addEventListener instead of
   setAttribute('onclick', ...) string injection, which was
   inconsistent, undebuggable, and incompatible with strict CSP.
   ================================================================ */
App.Renderer = (() => {

    function renderSession(turns, session, initialScrollTop = 0) {
        const container = document.getElementById('chatContainer');

        // Destroy old scroller first — prevents event listener leak
        if (App.state.currentScroller) {
            App.state.currentScroller.destroy();
            App.state.currentScroller = null;
        }
        container.innerHTML = '';

        // System Instructions panel
        if (session) {
            const siWrapper  = document.createElement('div');
            siWrapper.className = 'system-instruction-wrapper';

            const siLabel   = document.createElement('div');
            siLabel.className = 'system-instruction-label';
            siLabel.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg> System Instructions`;

            if (session.modelName) {
                const pill      = document.createElement('span');
                pill.className  = 'model-name-pill';
                pill.textContent = session.modelName;
                siLabel.appendChild(pill);
            }

            const siTextarea    = document.createElement('textarea');
            siTextarea.className = 'system-instruction-textarea';
            siTextarea.placeholder = '在此输入 System Prompt / Instructions（留空则忽略）';
            siTextarea.value    = session.systemInstruction || '';

            let siSaveTimer;
            siTextarea.addEventListener('input', () => {
                session.systemInstruction = siTextarea.value;
                clearTimeout(siSaveTimer);
                siSaveTimer = setTimeout(() => {
                    siTextarea.classList.add('saved-flash');
                    setTimeout(() => siTextarea.classList.remove('saved-flash'), CONFIG.TIMING.SAVE_FLASH);
                    // Firebase：同步 System Instruction
                    if (window.DB) {
                        window.DB.patchSession(session.id, {
                            systemInstruction: session.systemInstruction,
                            updatedAt: new Date().toISOString()
                        })
                        .then(() => window.setSyncStatus?.('ok', '已同步'))
                        .catch(err => {
                            console.error('[Firebase] System Prompt 同步失败:', err);
                            window.setSyncStatus?.('error', '同步失败');
                            window.showToast?.('⚠️ System Prompt 云端同步失败', 4000);
                        });
                    }
                }, CONFIG.TIMING.SAVE_DEBOUNCE);
            });

            siWrapper.appendChild(siLabel);
            siWrapper.appendChild(siTextarea);
            container.appendChild(siWrapper);
        }

        const validTurns = turns.filter(t =>
            (t.messageText || '').trim() || (t.thoughtText || '').trim()
        );
        if (validTurns.length > 0) {
            // Set scroll position BEFORE mounting so the first update() renders
            // the correct visible range, not always from the top.
            if (initialScrollTop > 0) container.scrollTop = initialScrollTop;
            App.state.viewMode = 'chat'; // chatContainer 正在展示对话视图
            App.state.currentScroller = new VirtualScroller(container, validTurns, createBubbleNode);
            App.state.currentScroller.mount();
        }
    }

    function showEmptyState() {
        const container = document.getElementById('chatContainer');
        if (App.state.currentScroller) {
            App.state.currentScroller.destroy();
            App.state.currentScroller = null;
        }
        App.state.viewMode = 'empty'; // chatContainer 正在展示空状态引导页
        container.innerHTML = `
            <div class="empty-state-wrapper">
                <label for="fileInput" class="empty-state">
                    <svg class="empty-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.22-3.22-7.51-7.51 3.22 3.22 7.51z"/></svg>
                    <div class="empty-text-main">Context Window: Infinite.<br>Memory: Ready.</div>
                    <div class="empty-text-sub">(请投喂你的聊天记录。)</div>
                </label>
            </div>`;
    }

    function createBubbleNode(item, index) {
        const wrapper   = document.createElement('div');
        wrapper.className = `msg-wrapper ${item.role === 'user' ? 'user' : 'model'}`;
        wrapper.id      = `msg-${index}`;

        // ── Role label ────────────────────────────────────────────
        const label     = document.createElement('div');
        label.className = `role-label ${item.role === 'user' ? 'user' : ''}`;

        const leftGroup = document.createElement('span');
        leftGroup.className = 'role-label-left';

        const roleText  = document.createElement('span');
        roleText.textContent = item.role.toUpperCase();
        leftGroup.appendChild(roleText);

        if (item.timestamp) {
            const tsEl      = document.createElement('span');
            tsEl.className  = 'msg-timestamp';
            tsEl.textContent = App.Utils.formatTime(item.timestamp);
            leftGroup.appendChild(tsEl);
        }

        const addImgBtn   = document.createElement('div');
        addImgBtn.className = 'add-img-btn-small';
        addImgBtn.title   = '插入图片';
        addImgBtn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/></svg>`;

        label.appendChild(leftGroup);
        label.appendChild(addImgBtn);

        const bubble    = document.createElement('div');
        bubble.className = 'message-bubble';

        addImgBtn.addEventListener('click', (e) => App.Images.triggerInsert(e, bubble, item));

        // ── Thought panel ─────────────────────────────────────────
        if (item.hasThought && item.thoughtText) {
            const thoughtPanel  = document.createElement('div');
            // Restore previously-saved open state (survives VirtualScroller re-renders)
            thoughtPanel.className = item._thoughtOpen ? 'thought-panel open' : 'thought-panel';

            const header        = document.createElement('div');
            header.className    = 'thought-header';
            // Use addEventListener (not setAttribute onclick string) for
            // correctness, debuggability, and CSP compatibility.
            header.addEventListener('click', (e) => {
                if (e.target.classList.contains('trans-btn')) return;
                _toggleThought(header);
            });

            const pill          = document.createElement('div');
            pill.className      = 'thought-pill';
            const geminiIcon    = `<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 2L14.5 9L22 12L14.5 15L12 22L9.5 15L2 12L9.5 9L12 2Z"/></svg>`;
            pill.innerHTML      = `<span class="thought-icon" style="display:flex;align-items:center">${geminiIcon}</span> <span class="thought-title">Thoughts</span>`;

            const transBtn      = document.createElement('button');
            transBtn.className  = 'trans-btn';
            transBtn.textContent = 'Translate';
            transBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                const bodyEl = thoughtPanel.querySelector('.thought-body');
                if (bodyEl) {
                    const text = bodyEl.textContent || bodyEl.innerText;
                    window.open(`https://translate.google.com/?sl=auto&tl=zh-CN&text=${encodeURIComponent(text.substring(0, CONFIG.SEARCH.TRANSLATE_MAX_CHARS))}`, '_blank');
                }
            });

            header.appendChild(pill);
            header.appendChild(transBtn);

            const bodyEl        = document.createElement('div');
            bodyEl.className    = 'thought-body markdown-body';
            bodyEl.innerHTML    = App.Utils.safeMarkdown(item.thoughtText);

            thoughtPanel.appendChild(header);
            thoughtPanel.appendChild(bodyEl);
            bubble.appendChild(thoughtPanel);
        }

        // ── Message text ──────────────────────────────────────────
        if (item.messageText) {
            const msgContent    = document.createElement('div');
            msgContent.className = 'message-text markdown-body';
            msgContent.innerHTML = App.Utils.safeMarkdown(item.messageText);
            bubble.appendChild(msgContent);
        }

        // ── Attached images ───────────────────────────────────────
        if (Array.isArray(item.images)) {
            item.images.forEach(imgData => {
                bubble.appendChild(App.Images.buildImageNode(imgData, item));
            });
        }

        wrapper.appendChild(label);
        wrapper.appendChild(bubble);
        return wrapper;
    }

    function _toggleThought(header) {
        const panel = header.closest('.thought-panel');
        if (!panel) return;
        panel.classList.toggle('open');
        const isOpen = panel.classList.contains('open');
        // Persist open state on the item data so VirtualScroller re-renders restore it
        const wrapper = panel.closest('.msg-wrapper');
        if (wrapper) {
            const idx = parseInt(wrapper.id.replace('msg-', ''), 10);
            if (App.state.currentScroller && !isNaN(idx)) {
                const item = App.state.currentScroller.items[idx];
                if (item) item._thoughtOpen = isOpen;
            }
        }
        if (!isOpen) {
            const rect = header.getBoundingClientRect();
            if (rect.top < 50) header.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        window.notifyVSResize && window.notifyVSResize();
    }

    function scrollToTop() {
        const c = document.getElementById('chatContainer');
        if (App.state.currentScroller) {
            App.state.currentScroller.scrollToIndex(0);
        } else {
            c.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function scrollToBottom() {
        const c  = document.getElementById('chatContainer');
        const sc = App.state.currentScroller;
        if (sc) {
            // Step 1: raw push to current physical bottom.
            c.scrollTop = c.scrollHeight;
            // Step 2: force-mount the real bottom DOM nodes.
            sc.update();
            // Step 3: after reflow, push again to absorb height growth
            //         from real node heights exceeding estimates.
            requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
        } else {
            c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
        }
    }

    function showLoadingState(sessionName) {
        const container = document.getElementById('chatContainer');
        if (App.state.currentScroller) {
            App.state.currentScroller.destroy();
            App.state.currentScroller = null;
        }
        App.state.viewMode = 'empty';
        container.innerHTML = `
            <div class="empty-state-wrapper">
                <div class="empty-state" style="cursor:default; border-style:solid; border-color:var(--accent-color);">
                    <svg class="empty-icon" viewBox="0 0 24 24" style="opacity:0.6; animation:pulse 1s infinite;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                    <div class="empty-text-main" style="font-size:16px;">${sessionName || '加载中'}</div>
                    <div class="empty-text-sub">正在从云端加载对话内容…</div>
                </div>
            </div>`;
    }

    return { renderSession, showEmptyState, showLoadingState, createBubbleNode, scrollToTop, scrollToBottom };
})();

// ── 向后兼容桩（Legacy Shim）─────────────────────────────────────────
// 旧版本（Batch 3 重构前）通过 setAttribute('onclick', ...) 生成的导出 HTML 中，
// thought-header 含有字符串形式的 onclick="toggleThought(this)"。
// 当前代码已改用 addEventListener，不再生成此类字符串，
// 但保留此桩以确保历史导出文件仍可正常工作。
// 【禁止删除，禁止挂载新功能于此】
window.toggleThought = function(header) {
    header.click(); // The header now has a native click listener
};


/* ================================================================
   § 12. IMAGES
   Insert, compress, render, delete, and lightbox for images.

   Bug fixed: currentImgTarget is now a local closure variable inside
   triggerInsert, not a shared global. Rapid sequential clicks no
   longer risk targeting the wrong bubble.
   ================================================================ */
App.Images = (() => {
    let _imgIdSeq = 0;

    function triggerInsert(e, bubbleElement, turnData) {
        e.stopPropagation();
        // Capture target in a local variable tied to this specific click,
        // eliminating the shared-global race condition.
        const target = { bubble: bubbleElement, turnData };
        const inserter = document.getElementById('imgInserter');
        // Replace the handler each time to bind the correct target closure
        inserter.onchange = (ev) => _handleInsert(ev, target);
        inserter.click();
    }

    // handleInsert (inline onchange fallback) has been removed:
    // triggerInsert() overwrites inserter.onchange with a closure each time,
    // so the static HTML onchange was never reachable. Dead code deleted in Batch 3.

    function _handleInsert(event, target) {
        const file = event.target.files[0];
        if (!file) return;
        event.target.value = '';

        // ── 找到当前 Session（在 await 前冻结上下文，防止异步竞态）──
        const sessionId = App.state.currentSessionId;
        const imgId     = `img-${++_imgIdSeq}-${Date.now()}`;

        if (window.DB) {
            // ── Firebase 路径：WebP 压缩 → Storage 上传 → 乐观更新 ──
            const storagePath = `attachments/${sessionId}_${imgId}.webp`;

            // Step 1：本地 Blob URL 立即展示预览（零延迟体验）
            const previewUrl = URL.createObjectURL(file);
            const imgData    = { id: imgId, base64: previewUrl, _isPreview: true };
            const node       = buildImageNode(imgData, target.turnData);
            target.bubble.appendChild(node);
            if (!target.turnData.images) target.turnData.images = [];
            target.turnData.images.push(imgData);

            // Step 2：后台静默压缩 + 上传
            (async () => {
                window.setSyncStatus?.('loading', '上传图片…');
                try {
                    const blob = await window.DB.compress(file);
                    const photoUrl = await window.DB.uploadPhoto(storagePath, blob);
                    URL.revokeObjectURL(previewUrl); // 释放预览内存

                    // Step 3：竞态兜底——上传期间用户可能已删除该 Session 或图片
                    const stillInSession = App.state.sessions.find(s => s.id === sessionId);
                    const stillInTurn    = target.turnData.images?.find(i => i.id === imgId);
                    if (!stillInSession || !stillInTurn) {
                        await window.DB.deletePhoto(storagePath).catch(() => {});
                        window.setSyncStatus?.('ok', '已同步');
                        return;
                    }

                    // Step 4：更新内存中的 imgData，替换为云端 URL
                    const idx = target.turnData.images.findIndex(i => i.id === imgId);
                    if (idx !== -1) {
                        target.turnData.images[idx] = { id: imgId, photoUrl, photoStoragePath: storagePath };
                    }
                    const imgEl = document.querySelector(`#container-${imgId} img`);
                    if (imgEl) imgEl.src = photoUrl;

                    // Step 5：重传 turns JSON 到 Storage（含最新图片 URL）
                    const session = App.state.sessions.find(s => s.id === sessionId);
                    if (session) {
                        await window.DB.uploadSessionTurns(sessionId, session.turns);
                    }
                    window.setSyncStatus?.('ok', '已同步');
                    window.showToast?.('🖼️ 图片已上传');
                } catch (err) {
                    console.error('[Firebase] 图片上传失败:', err);
                    URL.revokeObjectURL(previewUrl);
                    document.getElementById(`container-${imgId}`)?.remove();
                    if (target.turnData.images) {
                        target.turnData.images = target.turnData.images.filter(i => i.id !== imgId);
                    }
                    window.setSyncStatus?.('error', '上传失败');
                    window.showToast?.('⚠️ 图片上传失败，请检查网络后重试', 5000);
                }
            })();
        } else {
            // ── 离线降级路径：Base64 本地存储 ──
            _compress(file, (base64) => {
                if (!base64) { alert('图片处理失败，请重试'); return; }
                const imgData = { id: imgId, base64 };
                const node    = buildImageNode(imgData, target.turnData);
                target.bubble.appendChild(node);
                if (!target.turnData.images) target.turnData.images = [];
                target.turnData.images.push(imgData);
            });
        }
    }

    /** Build a reusable image DOM node (used by Renderer and _handleInsert) */
    function buildImageNode(imgData, turnData) {
        const container    = document.createElement('div');
        container.className = 'img-container';
        container.id       = `container-${imgData.id}`;

        const img          = document.createElement('img');
        // 优先使用云端 photoUrl，回退到 base64（本地遗留 / 预览阶段）
        img.src            = imgData.photoUrl || imgData.base64 || '';
        img.loading        = 'lazy';
        img.style.cursor   = 'zoom-in';
        img.addEventListener('click', () => openLightbox(img.src));
        img.addEventListener('load',  () => window.notifyVSResize && window.notifyVSResize());

        const delBtn       = document.createElement('button');
        delBtn.className   = 'img-del-btn';
        delBtn.innerHTML   = '✕';
        delBtn.title       = '删除图片';
        delBtn.addEventListener('click', () => _deleteImage(imgData.id, turnData));

        container.appendChild(img);
        container.appendChild(delBtn);
        return container;
    }

    function _deleteImage(imgId, turnData) {
        document.getElementById(`container-${imgId}`)?.remove();
        if (turnData.images) {
            const target = turnData.images.find(img => img.id === imgId);
            turnData.images = turnData.images.filter(img => img.id !== imgId);

            // Firebase：删除 Storage 图片 + 更新 Firestore
            if (target && window.DB) {
                const storagePath = target.photoStoragePath;
                (async () => {
                    if (storagePath) {
                        await window.DB.deletePhoto(storagePath).catch(() => {});
                    }
                    const sessionId = App.state.currentSessionId;
                    const session   = App.state.sessions.find(s => s.id === sessionId);
                    if (session) {
                        await window.DB.uploadSessionTurns(sessionId, session.turns).catch(err =>
                            console.error('[Firebase] 更新 turns 失败:', err)
                        );
                    }
                })();
            }
        }
    }

    /** Compress image to max CONFIG.IMAGE.MAX_DIMENSION px longest side, JPEG quality CONFIG.IMAGE.JPEG_QUALITY */
    function _compress(file, callback) {
        const reader = new FileReader();
        reader.onerror = () => callback(null);
        reader.onload  = (e) => {
            const img  = new Image();
            img.onerror = () => callback(null);
            img.onload = () => {
                const MAX = CONFIG.IMAGE.MAX_DIMENSION;
                let { width, height } = img;
                if (width > MAX || height > MAX) {
                    if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
                    else                { width  = Math.round(width  * MAX / height); height = MAX; }
                }
                const canvas = document.createElement('canvas');
                canvas.width  = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', CONFIG.IMAGE.JPEG_QUALITY));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightboxOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
        // Lightbox 遮挡画布时暂停虚拟滚动的 rAF，避免无意义渲染（宪法：弹窗打开时暂停后台渲染）
        if (App.state.currentScroller) App.state.currentScroller.pause();
    }

    function closeLightbox() {
        document.getElementById('lightboxOverlay').classList.remove('open');
        document.getElementById('lightboxImg').src = '';
        document.body.style.overflow = '';
        // 恢复虚拟滚动，同步 Lightbox 开启期间可能发生的尺寸变化
        if (App.state.currentScroller) App.state.currentScroller.resume();
    }

    return { triggerInsert, buildImageNode, openLightbox, closeLightbox };
})();


/* ================================================================
   § 13. EXPORT
   HTML, Markdown, and TXT export.

   Bug fixed: search highlights and wrapper spans are cleared before
   generating the HTML snapshot, preventing polluted <mark> and
   <span data-search-wrap> nodes from ending up in the exported file.

   Security fix: <!-- sequences are now escaped in the injected data
   script, in addition to the existing <\/script> escaping.
   ================================================================ */
App.Export = (() => {

    function showMenu(event) {
        event.stopPropagation();
        document.getElementById('exportMenu').classList.toggle('show');
    }

    function exportAs(format) {
        if (App.state.sessions.length === 0) { alert('没有可导出的内容'); return; }

        if (format === 'html') {
            const sizeMB = _estimateSizeMB();
            if (sizeMB > 20 && !confirm(`预估导出文件约 ${sizeMB.toFixed(0)} MB，继续吗？`)) return;
            App.Utils.downloadFile(
                _generateHTML(),
                `Gemini-Echo-${new Date().toISOString().slice(0, 10)}.html`,
                'text/html'
            );
            return;
        }

        // 导出全部会话的用户消息（跨 session 汇总）
        if (format === 'user-md') {
            App.Utils.downloadFile(
                _toAllUserMarkdown(),
                `Gemini-UserMessages-${new Date().toISOString().slice(0, 10)}.md`,
                'text/plain'
            );
            return;
        }

        const session = App.state.sessions.find(s => s.id === App.state.currentSessionId);
        if (!session) { alert('请先选择一个会话'); return; }
        const fname = App.Utils.sanitizeFilename(session.name);

        if (format === 'markdown') {
            App.Utils.downloadFile(_toMarkdown(session), `${fname}.md`, 'text/plain');
        } else if (format === 'txt') {
            App.Utils.downloadFile(_toTXT(session), `${fname}.txt`, 'text/plain');
        }
    }

    function _estimateSizeMB() {
        let total = 0;
        App.state.sessions.forEach(s =>
            (s.turns || []).forEach(t =>
                (t.images || []).forEach(img => { total += img.base64.length; })
            )
        );
        return ((total / 1.37) + 512 * 1024) / (1024 * 1024);
    }

    function _generateHTML() {
        // Clear search state before snapshotting DOM, to avoid exporting
        // <mark> highlights and data-search-wrap spans into the output file.
        App.Search.clearHighlight();

        const parser = new DOMParser();
        const doc    = parser.parseFromString(document.documentElement.outerHTML, 'text/html');

        // Clean transient UI state
        doc.getElementById('sidebar')?.classList.remove('open');
        doc.getElementById('searchBar')?.classList.remove('open');
        doc.getElementById('exportMenu')?.classList.remove('show');
        const fileList = doc.getElementById('fileList');
        if (fileList) fileList.innerHTML = '';
        const chatContainer = doc.getElementById('chatContainer');
        if (chatContainer) chatContainer.innerHTML = '';

        // Inject session data as a bootstrap script
        // Security: escape <\/script>, <!-- and Unicode line terminators
        const safeData = JSON.stringify(App.state.sessions)
            .replace(/<\/script>/gi, '<\\/script>')
            .replace(/<!--/g, '<\\!--')
            .replace(/\u2028/g, '\\u2028')
            .replace(/\u2029/g, '\\u2029');

        const script = doc.createElement('script');
        script.textContent =
            `window.restoredSessions = ${safeData}; ` +
            `window.restoredSessionId = ${JSON.stringify(App.state.currentSessionId)};`;
        doc.body.appendChild(script);

        return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
    }

    function _toMarkdown(session) {
        let md = `# ${session.name}\n\n`;
        if (session.systemInstruction?.trim()) {
            md += `## SYSTEM\n\n${session.systemInstruction.trim()}\n\n---\n\n`;
        }
        session.turns.forEach(turn => {
            md += `## ${turn.role.toUpperCase()}\n\n`;
            if (turn.hasThought) {
                md += `> **💭 Thoughts**\n>\n> ${turn.thoughtText.replace(/\n/g, '\n> ')}\n\n`;
            }
            md += `${turn.messageText}\n\n---\n\n`;
        });
        return md;
    }

    function _toTXT(session) {
        let txt = `${session.name}\n${'='.repeat(40)}\n\n`;
        if (session.systemInstruction?.trim()) {
            txt += `【SYSTEM】\n${session.systemInstruction.trim()}\n\n${'-'.repeat(40)}\n\n`;
        }
        session.turns.forEach(turn => {
            txt += `【${turn.role.toUpperCase()}】\n`;
            if (turn.hasThought) txt += `[思考]: ${turn.thoughtText}\n`;
            txt += `${turn.messageText}\n\n${'-'.repeat(40)}\n\n`;
        });
        return txt;
    }

    /**
     * 导出所有会话中的用户消息，汇总为一个 Markdown 文件。
     * 结构：每个会话用 # 标题分隔，每条用户消息前缀 ▶ 符号。
     * 跳过 turns 尚未加载（null）的会话，并在末尾附注说明。
     */
    function _toAllUserMarkdown() {
        const sessions = App.state.sessions;
        let md = '';
        const skipped = [];

        sessions.forEach(session => {
            // turns 为 null 表示尚未懒加载，跳过并记录
            if (!Array.isArray(session.turns)) {
                skipped.push(session.name);
                return;
            }
            const userTurns = session.turns.filter(t => t.role === 'user' && (t.messageText || '').trim());
            if (userTurns.length === 0) return;

            md += `# ${session.name}\n\n`;
            userTurns.forEach(turn => {
                md += `▶ ${turn.messageText.trim()}\n\n`;
            });
            md += '\n';
        });

        if (md === '') md = '（没有可导出的用户消息）\n';

        if (skipped.length > 0) {
            md += `---\n\n> ⚠️ 以下会话因尚未打开过、内容未加载，已跳过：\n`;
            skipped.forEach(name => { md += `> - ${name}\n`; });
            md += '\n> 请先逐一点击这些会话后，再重新导出。\n';
        }

        return md;
    }

    return { showMenu, exportAs };
})();


/* ================================================================
   § 14. EVENTS
   全局事件委派层（Global Event Delegation）。

   设计决策：
   - 使用单一 document 级 click 监听器 + data-action 路由取代
     分散在 HTML 模板中的 14 处内联 onclick/oninput/onchange。
   - HTML 模板只负责声明意图（data-action="xxx"），
     逻辑全部收拢在此模块，逻辑与模板彻底解耦。
   - searchInput 的 input/keydown 因无法用 data-action 表达，
     在 init() 中通过 getElementById 直接绑定。
   - lightboxImg 的 stopPropagation 同理在 init() 中绑定，
     防止点击图片本身触发 lightbox-close 路由。

   导出菜单关闭策略：
   - 任意 click 到达 document 时，若点击目标不是导出按钮本身
     （data-action="export-menu"），则自动关闭菜单。
   - 这样无论点击菜单项还是页面其他区域，菜单都会先关闭，
     再由路由执行对应操作，无需在各 case 中重复写关闭逻辑。
   ================================================================ */
App.Events = (() => {

    function init() {

        // ── Global click router ──────────────────────────────────────
        document.addEventListener('click', (e) => {

            // 导出菜单：点击导出按钮以外的任意位置均关闭菜单。
            // 原版依赖第二个 document 监听器 + stopPropagation 实现；
            // 现在两者合并在同一个处理器内，逻辑更清晰。
            if (!e.target.closest('[data-action="export-menu"]')) {
                document.getElementById('exportMenu').classList.remove('show');
            }

            const el = e.target.closest('[data-action]');
            if (!el) return;

            switch (el.dataset.action) {
                case 'sidebar-toggle':
                case 'sidebar-backdrop':   App.Sidebar.toggle();           break;
                case 'search-toggle':      App.Search.toggle();            break;
                case 'search-scope':       App.Search.toggleScope();       break;
                case 'search-prev':        App.Search.next(false);         break;
                case 'search-next':        App.Search.next(true);          break;
                case 'search-close':       App.Search.toggle();            break;
                case 'export-menu':        App.Export.showMenu(e);         break;
                case 'export-html':        App.Export.exportAs('html');     break;
                case 'export-markdown':    App.Export.exportAs('markdown'); break;
                case 'export-txt':         App.Export.exportAs('txt');      break;
                case 'export-user-md':     App.Export.exportAs('user-md'); break;
                case 'scroll-top':         App.Renderer.scrollToTop();     break;
                case 'scroll-bottom':      App.Renderer.scrollToBottom();  break;
                case 'theme-toggle':       App.Theme.toggle();             break;
                case 'lightbox-close':     App.Images.closeLightbox();     break;
            }
        });

        // ── searchInput：input / keydown ─────────────────────────────
        // oninput / onkeydown 无法用 data-action 路由（非 click 事件），
        // 在此处直接绑定，与路由层分开但同样集中管理。
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input',   ()  => App.Search.onInput());
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') App.Search.next(true); });

        // ── lightboxImg：阻止点击图片冒泡至 lightbox-close 路由 ──────
        // 原版使用内联 onclick="event.stopPropagation()"；
        // 现移至此处统一管理，保持 HTML 模板纯净。
        document.getElementById('lightboxImg').addEventListener('click', (e) => {
            e.stopPropagation();
        });
    }

    return { init };
})();


/* ================================================================
   § 15. INIT
   Boot sequence and global event listeners.
   ================================================================ */
App.Theme.init();
App.FileImport.init();
App.Events.init();

// Global keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const lb  = document.getElementById('lightboxOverlay');
        const bar = document.getElementById('searchBar');
        if (lb.classList.contains('open'))  { App.Images.closeLightbox(); return; }
        if (bar.classList.contains('open')) { App.Search.toggle(); return; }
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
        e.preventDefault();
        const bar = document.getElementById('searchBar');
        if (!bar.classList.contains('open')) App.Search.toggle();
        else document.getElementById('searchInput').focus();
    }
    // Route End / Home through the virtual scroller so the bottom-lock and
    // anchor compensation handle them, rather than the browser jumping
    // directly to raw scrollHeight (which could retrigger feedback loops).
    if (e.key === 'End' || e.key === 'Home') {
        const tag = document.activeElement && document.activeElement.tagName;
        if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
            if (App.state.currentScroller && !App.state.currentScroller.isFullRender) {
                e.preventDefault();
                if (e.key === 'End') App.Renderer.scrollToBottom();
                else                 App.Renderer.scrollToTop();
            }
        }
    }
});

// 页面可见性：标签页切换到后台时暂停虚拟滚动，回到前台时恢复。
// 宪法：document.hidden === true 时主动暂停持续性 rAF 动画，
// 减少后台 CPU/GPU 占用，防止设备无谓发热耗电。
document.addEventListener('visibilitychange', () => {
    const sc = App.state.currentScroller;
    if (!sc) return;
    if (document.hidden) sc.pause();
    else                 sc.resume();
});

// Restore sessions embedded in the HTML on load (from a previous HTML export)
// Firebase 加载完成后会调用 App._cloudRestore() 覆盖此处的数据
window.addEventListener('DOMContentLoaded', () => {
    if (window.restoredSessions && Array.isArray(window.restoredSessions)) {
        App.state.sessions = window.restoredSessions;
        const targetId = window.restoredSessionId ||
            (App.state.sessions.length > 0 ? App.state.sessions[0].id : null);
        if (targetId) App.Sessions.switchTo(targetId);
        App.Sidebar.render();
    }
});

/**
 * App._cloudRestore — 由 Firebase module script 在加载完成后调用。
 * sessions 只含元数据（turns === null），turns 由 switchTo 懒加载。
 */
App._cloudRestore = function(sessions, groups = []) {
    if (!Array.isArray(sessions) || sessions.length === 0) return;
    App.state.sessions = sessions;
    App.state.groups   = groups;
    const currentId   = App.state.currentSessionId;
    const stillExists = currentId && sessions.find(s => s.id === currentId);
    if (stillExists) {
        App.Sidebar.render();
    } else {
        App.Sessions.switchTo(sessions[0].id);
        App.Sidebar.render();
    }
};

</script>
<!-- ================================================================
     § 16. FIREBASE
     架构：Firestore 存轻量元数据 + Storage 存 turns JSON。
     彻底解决单文档 1MB 上限，支持任意长度对话。
     ================================================================ -->
<script type="module">
import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
    getFirestore, collection, doc,
    getDocs, setDoc, deleteDoc, query, where
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import {
    getStorage, ref, uploadBytes, getDownloadURL, deleteObject, getBytes
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-storage.js";

/* ── Firebase 初始化 ──────────────────────────────────────────── */
const firebaseConfig = {
    apiKey:            "AIzaSyCq0apieaxh4xaAoJBJ5Evam_jnNOr8yBw",
    authDomain:        "gen-lang-client-0378444111.firebaseapp.com",
    projectId:         "gen-lang-client-0378444111",
    storageBucket:     "gen-lang-client-0378444111.firebasestorage.app",
    messagingSenderId: "440342290540",
    appId:             "1:440342290540:web:894148c0d604d2eaa33849"
};

const firebaseApp = initializeApp(firebaseConfig);
const db          = getFirestore(firebaseApp);
const storage     = getStorage(firebaseApp);

/* ── UI 反馈工具 ──────────────────────────────────────────────── */
let _toastTimer;

function showToast(msg, duration = 3000) {
    const el = document.getElementById('fbToast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function setSyncStatus(state, label) {
    const badge = document.getElementById('syncBadge');
    const txt   = document.getElementById('syncLabel');
    if (!badge || !txt) return;
    badge.className = `sync-badge ${state}`;
    txt.textContent = label;
}

/* ── 常量 ─────────────────────────────────────────────────────── */
const COL   = 'notes';
const QUERY = () => query(
    collection(db, COL),
    where('domain', '==', 'explore'),
    where('type',   '==', 'gemini_echo_session')
);

/* ── 图片压缩（宪法标准两级 compressWebP）────────────────────── */
function compress(file, maxW = 800, quality = 0.75, preMax = 2048) {
    return new Promise((resolve, reject) => {
        const img       = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(objectUrl);
            let w = img.width, h = img.height;
            if (w > preMax || h > preMax) {
                const s = Math.min(preMax / w, preMax / h);
                w = w * s | 0; h = h * s | 0;
            }
            if (w > maxW || h > maxW) {
                if (w > h) { h = h * maxW / w | 0; w = maxW; }
                else        { w = w * maxW / h | 0; h = maxW; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            canvas.toBlob(
                blob => { if (blob) return resolve(blob);
                    canvas.toBlob(b => b ? resolve(b) : reject('compress fail'),
                        'image/jpeg', quality); },
                'image/webp', quality
            );
        };
        img.onerror = () => { URL.revokeObjectURL(objectUrl); reject('image load fail'); };
        img.src = objectUrl;
    });
}

/* ── 剥离 base64 预览，只保留已上传的云端 URL ─────────────────── */
function stripBase64(turns) {
    return (turns || []).map(t => ({
        role:        t.role,
        hasThought:  t.hasThought  ?? false,
        thoughtText: t.thoughtText ?? '',
        messageText: t.messageText ?? '',
        timestamp:   t.timestamp   ?? null,
        images: (t.images || [])
            .filter(img => img.photoUrl)
            .map(img => ({
                id:               img.id,
                photoUrl:         img.photoUrl,
                photoStoragePath: img.photoStoragePath,
            })),
    }));
}

/* ── turns JSON 上传到 Storage ────────────────────────────────── */
async function _uploadTurnsJSON(sessionId, turns) {
    const clean = stripBase64(turns);
    const blob  = new Blob([JSON.stringify(clean)], { type: 'application/json' });
    const path  = `sessions/${sessionId}.json`;
    const sr    = ref(storage, path);
    await uploadBytes(sr, blob);
    const url = await getDownloadURL(sr);
    return { path, url };
}

/* ── Session ↔ Firestore 文档互转（纯元数据，不含 turns）──────── */
function sessionToMetaDoc(session, turnsStoragePath, turnsUrl) {
    const now = new Date().toISOString();
    return {
        domain:            'explore',
        type:              'gemini_echo_session',
        name:              session.name              ?? '',
        systemInstruction: session.systemInstruction ?? '',
        modelName:         session.modelName         ?? '',
        turnsStoragePath:  turnsStoragePath,
        turnsUrl:          turnsUrl,
        turnCount:         (session.turns || []).length,
        sortOrder:         session.sortOrder         ?? 0,
        groupId:           session.groupId           ?? null,
        createdAt:         session.createdAt         ?? now,
        updatedAt:         now,
        firstMessageTime:  session.firstMessageTime  ?? null,
        lastMessageTime:   session.lastMessageTime   ?? null,
    };
}

function docToSession(id, data) {
    return {
        id,
        name:              data.name              ?? '未命名会话',
        systemInstruction: data.systemInstruction ?? '',
        modelName:         data.modelName         ?? '',
        turns:             null,          // null = 尚未加载，由 switchTo 懒加载
        turnsStoragePath:  data.turnsStoragePath ?? null,
        turnsUrl:          data.turnsUrl          ?? null,
        turnCount:         data.turnCount         ?? 0,
        sortOrder:         data.sortOrder         ?? 0,
        groupId:           data.groupId           ?? null,
        timestamp:         data.createdAt         ?? data.updatedAt ?? new Date().toISOString(),
        createdAt:         data.createdAt         ?? new Date().toISOString(),
        updatedAt:         data.updatedAt         ?? new Date().toISOString(),
    };
}

/* ================================================================
   DB 层——所有 Firebase 操作的唯一入口
   ================================================================ */
const DB = {

    // ── 工具函数（供业务代码使用）──────────────────────────────
    compress,
    stripBase64,

    // ── turns 懒加载（Storage SDK getBytes，不走浏览器 fetch，无 CORS 问题）──
    fetchTurns: async (storagePath) => {
        const bytes      = await getBytes(ref(storage, storagePath));
        const jsonString = new TextDecoder().decode(bytes);
        return JSON.parse(jsonString);
    },

    // ── Session CRUD ───────────────────────────────────────────

    /**
     * 创建新 Session：
     * 1. turns JSON → 上传到 Storage → 拿到 URL
     * 2. 元数据（含 URL）→ 写入 Firestore
     * Firestore 文档永远不超过几 KB，彻底解决 1MB 限制
     */
    createSession: async (session) => {
        const { path, url } = await _uploadTurnsJSON(session.id, session.turns || []);
        await setDoc(
            doc(db, COL, session.id),
            sessionToMetaDoc(session, path, url)
        );
    },

    /** 只拉元数据，不含 turns（Sidebar 渲染用） */
    loadSessions: async () => {
        const snap     = await getDocs(QUERY());
        const sessions = snap.docs.map(d => docToSession(d.id, d.data()));
        // 有 sortOrder 时按 sortOrder 升序；sortOrder 相同（如旧数据全为0）则 fallback 名称序
        sessions.sort((a, b) =>
            a.sortOrder !== b.sortOrder
                ? a.sortOrder - b.sortOrder
                : a.name.localeCompare(b.name, 'zh-CN', { numeric: true })
        );
        return sessions;
    },

    /** 更新元数据字段（重命名、System Prompt、sortOrder、groupId） */
    patchSession: async (id, patch) => {
        await setDoc(
            doc(db, COL, id),
            { ...patch, updatedAt: new Date().toISOString() },
            { merge: true }
        );
    },

    // ── 分组 CRUD ──────────────────────────────────────────────

    loadGroups: async () => {
        const q    = query(collection(db, COL),
            where('domain', '==', 'explore'),
            where('type',   '==', 'gemini_echo_group'));
        const snap = await getDocs(q);
        const groups = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        groups.sort((a, b) => (a.sortOrder ?? 0) - (b.sortOrder ?? 0));
        return groups;
    },

    saveGroup: async (group) => {
        await setDoc(doc(db, COL, group.id), {
            domain:    'explore',
            type:      'gemini_echo_group',
            name:      group.name,
            sortOrder: group.sortOrder ?? 0,
            collapsed: group.collapsed ?? false,
            updatedAt: new Date().toISOString(),
        }, { merge: true });
    },

    deleteGroup: async (groupId) => {
        await deleteDoc(doc(db, COL, groupId));
    },

    /**
     * 重传 turns JSON 到 Storage（图片增删后调用）。
     * Storage 同路径上传自动覆盖旧文件，但 Download Token 会变，
     * 所以同时 patch Firestore 更新 turnsUrl。
     */
    uploadSessionTurns: async (sessionId, turns) => {
        const { path, url } = await _uploadTurnsJSON(sessionId, turns);
        await setDoc(
            doc(db, COL, sessionId),
            { turnsUrl: url, turnsStoragePath: path,
              turnCount: (turns || []).length,
              updatedAt: new Date().toISOString() },
            { merge: true }
        );
        // 同步更新内存中的 session.turnsUrl，避免下次懒加载用旧 URL
        const session = (typeof App !== 'undefined')
            ? App.state.sessions.find(s => s.id === sessionId)
            : null;
        if (session) { session.turnsUrl = url; session.turnsStoragePath = path; }
        return url;
    },

    /**
     * 连根拔起删除 Session：
     * 1. 删 Firestore 元数据文档
     * 2. 删 Storage turns JSON
     * 3. 并行删所有关联图片
     */
    deleteSessionCompletely: async (session) => {
        // 收集图片路径（turns 可能已懒加载到内存）
        const imgPaths = [];
        (session.turns || []).forEach(t => {
            (t.images || []).forEach(img => {
                if (img.photoStoragePath) imgPaths.push(img.photoStoragePath);
            });
        });

        await deleteDoc(doc(db, COL, session.id));

        const toDelete = [];
        if (session.turnsStoragePath) {
            toDelete.push(deleteObject(ref(storage, session.turnsStoragePath)).catch(() => {}));
        }
        imgPaths.forEach(p => toDelete.push(deleteObject(ref(storage, p)).catch(() => {})));
        await Promise.all(toDelete);
    },

    // ── Storage 图片操作 ───────────────────────────────────────
    uploadPhoto: async (path, blob) => {
        const sr = ref(storage, path);
        await uploadBytes(sr, blob);
        return getDownloadURL(sr);
    },

    deletePhoto: (storagePath) => deleteObject(ref(storage, storagePath)),
};

/* ── 挂载到 window ────────────────────────────────────────────── */
window.DB            = DB;
window.showToast     = showToast;
window.setSyncStatus = setSyncStatus;

/* ── 等待 DOM + App 模块就绪 ──────────────────────────────────── */
function waitForDOM() {
    return new Promise(resolve => {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', resolve, { once: true });
        } else {
            resolve();
        }
    });
}

/* ── 页面启动：拉元数据列表，触发首个会话懒加载 ─────────────────── */
(async () => {
    await waitForDOM();
    setSyncStatus('loading', '加载中…');

    try {
        const [sessions, groups] = await Promise.all([
            DB.loadSessions(),
            DB.loadGroups(),
        ]);

        if (sessions.length === 0 && groups.length === 0) {
            setSyncStatus('ok', '云端为空');
            showToast('☁️ 云端暂无会话，请导入文件');
        } else {
            setSyncStatus('ok', `已同步 ${sessions.length} 个`);
            if (typeof App !== 'undefined' && App._cloudRestore) {
                App._cloudRestore(sessions, groups);
            }
        }
    } catch (err) {
        console.error('[Firebase] 加载失败:', err);
        setSyncStatus('error', '加载失败');
        showToast('⚠️ 云端加载失败：' + (err.message || err), 5000);
    }
})();
</script>
